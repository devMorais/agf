<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <title>Painel Administrativo — {{ constant('SITE_NOME') }}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.0/css/all.css">

    <!-- FancyBox -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css">

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">

    <!-- jBox -->
    <link href="https://cdn.jsdelivr.net/gh/StephanWagner/jBox@v1.3.3/dist/jBox.all.min.css" rel="stylesheet">

    <!-- CSS global + Admin -->
    <link rel="stylesheet"
        href="{{ url('templates/assets/css/estilos.css') }}?v={{ versaoArquivo('templates/assets/css/estilos.css') }}">
    <link rel="stylesheet"
        href="{{ url('templates/admin/assets/css/admin.css') }}?v={{ versaoArquivo('templates/admin/assets/css/admin.css') }}">

    <link rel="shortcut icon" href="{{ url('templates/site/assets/img/LOGO.png') }}" />
</head>

<body>

    {% block corpo %} {% endblock %}

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <!-- FancyBox -->
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.umd.js"></script>

    <!-- jBox -->
    <script src="https://cdn.jsdelivr.net/gh/StephanWagner/jBox@v1.3.3/dist/jBox.all.min.js"></script>

    <!-- DataTables -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

    <!-- CKEditor -->
    <script src="{{ url('templates/admin/assets/js/ckeditor/ckeditor.js') }}?v={{ versaoArquivo('templates/admin/assets/js/ckeditor/ckeditor.js') }}"></script>

    <!-- Scripts globais + Admin -->
    <script src="{{ url('templates/assets/js/scripts.js') }}?v={{ versaoArquivo('templates/assets/js/scripts.js') }}"></script>
    <script src="{{ url('templates/admin/assets/js/admin.js') }}?v={{ versaoArquivo('templates/admin/assets/js/admin.js') }}"></script>
    <script src="{{ url('templates/admin/assets/js/datatable.js') }}?v={{ versaoArquivo('templates/admin/assets/js/datatable.js') }}"></script>
</body>

</html>

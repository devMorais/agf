<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <title>
        {% if titulo %}{{ titulo }} — {{ constant('SITE_NOME') }}
        {% else %}Fazer Doação — {{ constant('SITE_NOME') }}
        {% endif %}
    </title>

    <meta name="description" content="Faça sua doação de forma segura e ajude a transformar vidas.">
    <meta name="theme-color" content="#ed583f">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://use.fontawesome.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.0/css/all.css">

    <!-- jBox -->
    <link href="https://cdn.jsdelivr.net/gh/StephanWagner/jBox@v1.3.3/dist/jBox.all.min.css" rel="stylesheet">

    <!-- CSS global + Site -->
    <link rel="stylesheet"
        href="{{ url('templates/assets/css/estilos.css') }}?v={{ versaoArquivo('templates/assets/css/estilos.css') }}">
    <link rel="stylesheet"
        href="{{ url('templates/site/assets/css/site.css') }}?v={{ versaoArquivo('templates/site/assets/css/site.css') }}">

    <link rel="shortcut icon" href="{{ url('templates/site/assets/img/LOGO.png') }}" type="image/png">
</head>

<body class="checkout-body">

    <!-- Overlay de carregamento AJAX -->
    <div class="ajaxLoading" aria-hidden="true">
        <div class="spinner">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <p>Aguarde...</p>
        </div>
    </div>

    <!-- Header minimalista (apenas logo + voltar) -->
    <header class="checkout-topbar">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between py-3">

                <a href="{{ url() }}" class="text-decoration-none d-flex align-items-center">
                    <img src="{{ url('templates/site/assets/img/LOGO.png') }}"
                         alt="{{ constant('SITE_NOME') }}"
                         style="max-height: 42px; width: auto;">
                </a>

                <a href="{{ url() }}" class="checkout-back-link">
                    <i class="fas fa-arrow-left me-2"></i>
                    <span class="d-none d-sm-inline">Voltar ao site</span>
                    <span class="d-sm-none">Voltar</span>
                </a>

            </div>
        </div>
    </header>

    {% block conteudo %} {% endblock %}

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/gh/StephanWagner/jBox@v1.3.3/dist/jBox.all.min.js"></script>

    <script src="{{ url('templates/assets/js/scripts.js') }}?v={{ versaoArquivo('templates/assets/js/scripts.js') }}"></script>
    <script src="{{ url('templates/site/assets/js/site.js') }}?v={{ versaoArquivo('templates/site/assets/js/site.js') }}"></script>
</body>

</html>

{% extends 'base.html' %}
{% block conteudo %}

<div class="container my-5 d-flex flex-column justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="spinner-border text-primary mb-4" style="width: 4rem; height: 4rem;" role="status">
        <span class="visually-hidden">Carregando...</span>
    </div>

    <h2 class="fw-bold mb-3" style="color: #084298;">Redirecionando para pagamento seguro...</h2>
    <p class="text-muted fs-5 mb-4">Você está sendo levado para o ambiente da <b>InfinitePay</b>.</p>

    <a href="{{ link }}" class="btn btn-outline-primary rounded-pill px-4">
        Clique aqui se não for redirecionado em 3 segundos
    </a>
</div>

<script>
    // Redireciona automaticamente após 1.5 segundos
    setTimeout(function () {
        window.location.href = '{{ link }}';
    }, 1500);
</script>

{% endblock %}

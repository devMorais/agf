<style>
   
</style>

<div class="card widget-categorias mb-4"
    style="border: none; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.03); overflow: hidden;">

    <div class="card-header bg-white" style="padding: 1.5rem; border-bottom: 1px solid #f3f4f6;">
        <h5 class="fw-bolder mb-0 text-dark text-uppercase" style="font-size: 1.05rem; letter-spacing: 1px;">
            <i class="fas fa-layer-group text-warning me-2"></i> Categorias
        </h5>
    </div>

    <div class="card-body p-0">
        {% if categorias %}
        <ul class="list-group list-group-flush">
            {% for categoria in categorias %}
            <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent">

                <a href="{{url('categoria/'~categoria.slug)}}" class="fw-bold categoria-link w-100" tooltip="tooltip"
                    title="{{categoria.titulo}}">
                    <i class="fas fa-chevron-right me-3"></i>
                    {{categoria.titulo}}
                </a>

                {% if usuario().level == 3 %}
                <div class="d-flex gap-2 ms-3">
                    <a href="{{ url('admin/categorias/editar/'~categoria.id) }}" class="sidebar-admin-btn btn-edit"
                        tooltip="tooltip" title="Editar">
                        <i class="fa-solid fa-pen" style="font-size: 0.8rem;"></i>
                    </a>
                    <a href="{{ url('admin/categorias/deletar/'~categoria.id) }}" class="sidebar-admin-btn btn-delete"
                        tooltip="tooltip" title="Deletar">
                        <i class="fa-solid fa-trash" style="font-size: 0.8rem;"></i>
                    </a>
                </div>
                {% endif %}

            </li>
            {% endfor %}
        </ul>

        {% else %}
        <div class="p-5 text-center text-muted">
            <i class="fas fa-tags fs-2 mb-3 opacity-25"></i>
            <p class="mb-0 fw-bold">Nenhuma categoria cadastrada!</p>
        </div>
        {% endif %}
    </div>
</div>

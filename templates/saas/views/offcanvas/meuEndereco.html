<div class="offcanvas offcanvas-top" tabindex="-1" id="meuEndereco" aria-labelledby="offcanvasTopLabel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasTopLabel">Meu Endereço:</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <div class="card-body">
            {% if enderecos %}
            <div class="table-responsive">
                <div class="container mt-4">
                    <table class="table table-hover table-sm table-bordered" id="tabela">
                        <thead class="thead-dark">
                            <tr>
                                <th class="{% if end.cep %}fw-bold text-success{% else %} fw-bold text-danger {% endif %}">CEP</th>
                                <th class="{% if end.endereco %}fw-bold text-success text-center {% else %} fw-bold text-danger {% endif %}">Endereco</th>
                                <th class="{% if end.bairro %}fw-bold text-success text-center {% else %} fw-bold text-danger {% endif %}">Bairro</th>
                                <th class="{% if end.cidade %}fw-bold text-success text-center {% else %} fw-bold text-danger {% endif %}">Cidade</th>
                                <th class="{% if end.estado %}fw-bold text-success text-center {% else %} fw-bold text-danger {% endif %}">Estado</th>
                                <th class="text-center">Alterar</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for endereco in enderecos %}
                            <tr>
                                <td>
                                    <div>
                                        {{endereco.cep}}
                                    </div>
                                </td>
                                <td class="text-center">{{endereco.endereco}}</td>
                                <td class="text-center">{{endereco.bairro}}</td>
                                <td class="text-center">{{endereco.cidade}}</td>
                                <td class="text-center">{{endereco.estado}}</td>
                                <td class="text-center">
                                    <a href="" data-bs-toggle="modal" data-bs-target="#editarEndereco">
                                        <i class="fa-solid fa-pen m-1"></i>
                                    </a>
                                </td>
                            </tr>
                            {%endfor%}
                        </tbody>
                    </table>
                </div>
            </div>
            {% else %}
            <div class="alert alert-warning" role="alert">
                Nenhum endereço cadastrado para exibir!
            </div>
            {% endif %}
        </div>
    </div>
</div>
